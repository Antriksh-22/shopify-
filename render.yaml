services:
  - type: web
    name: shopify-ai-automation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn shopify_ai_automation.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: mock
      - key: SARVAM_MODEL
        value: sarvam-105b
